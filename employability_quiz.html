        body {

            background: linear-gradient(135deg, #667eea, #764ba2);

            padding: 0;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 25px;

        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        #score {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            position: sticky;
            top: 0px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            z-index: 100;
            border-bottom: 2px solid #667eea;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-bar-bg {
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 12px;
            width: 0%;
            background: #4CAF50;
            transition: 0.3s;
        }

        #progressText {
            text-align: center;
            font-size: 14px;
        }

        .question {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 12px;
            background: #f9f9f9;
            transition: 0.2s;
        }

        .question:hover {
            transform: scale(1.01);
        }

        label {
            display: block;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: 0.2s;
        }

        label:hover {
            background: #f1f1f1;
        }

        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        .correct-option {
            background-color: #d4edda;
            border-color: #28a745;
        }

        .wrong-option {
            background-color: #f8d7da;
            border-color: #dc3545;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 8px;
            font-weight: bold;
        }

        .correct { color: green; }
        .wrong { color: red; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            background: #ff6b6b;
        }

        .reset-btn:hover {
            background: #e55050;
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
                padding: 15px;
            }

            h2 {
                font-size: 24px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .question p {
                font-size: 18px;
            }

            label {
                font-size: 16px;
                padding: 10px;
            }

            button {
                width: 100%;
                margin-top: 10px;
                padding: 15px;
                font-size: 18px;
                font-weight: bold;
            }
        }

</head>

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function loadQuiz() {
    score = 0;
    attempted = 0;

    document.getElementById("score").innerHTML = "Score: 0 / 0";
    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("progressText").innerHTML = "0 / " + questions.length + " Completed";

    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    const shuffled = shuffle([...questions]);

    shuffled.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "question";

        let html = `<p><b>Q${index + 1}: ${item.q}</b></p>`;

        item.options.forEach((opt, i) => {
            html += `
                <label>
                    <input type="radio" name="q${index}" value="${i}">
                    ${opt}
                </label>
            `;
        });

        html += `<button onclick="checkAnswer(${index}, ${item.answer})">Check Answer</button>`;
        html += `<p id="result${index}" class="result"></p>`;

        div.innerHTML = html;
        quizDiv.appendChild(div);
    });
}

function checkAnswer(qIndex, correct) {
    const options = document.getElementsByName("q" + qIndex);

    // BUG FIX: check disabled state instead of result text,
    // so the "Select an option" warning doesn't block re-checking.
    if (options[0] && options[0].disabled) return;

    let selected = -1;
    Array.from(options).forEach((opt, i) => {
        if (opt.checked) selected = i;
    });

    const result = document.getElementById("result" + qIndex);

    if (selected === -1) {
        result.innerHTML = "⚠️ Please select an option first!";
        return;
    }

    attempted++;

    Array.from(options).forEach((opt, i) => {
        const label = opt.parentElement;
        if (i === correct) label.classList.add("correct-option");
        if (i === selected && selected !== correct) label.classList.add("wrong-option");
        opt.disabled = true;
    });

    if (selected === correct) {
        score++;
        result.innerHTML = "✅ Correct!";
        result.className = "result correct";
    } else {
        const correctText = options[correct].parentElement.innerText.trim();
        result.innerHTML = "❌ Wrong! Correct answer: " + correctText;
        result.className = "result wrong";
    }

    document.getElementById("score").innerHTML = `Score: ${score} / ${attempted}`;

    const percent = (attempted / questions.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("progressText").innerHTML = `${attempted} / ${questions.length} Completed`;
}

loadQuiz();

</script>
