<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Quiz Dashboard</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-menu a:hover {
            color: var(--primary-color);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
            flex: 1;
        }

        /* Dashboard View */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #0f172a;
        }

        .welcome-header p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Responsive Grid */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .card-icon {
            font-size: 30px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex: 1;
        }

        .start-btn {
            display: inline-block;
            text-align: center;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .start-btn:hover {
            background-color: #1557b0;
        }

        /* Quiz Runner View (External Frame Frame) */
        .quiz-header-bar {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-subject-title {
            font-weight: 600;
            font-size: 18px;
        }

        .back-btn {
            background-color: #f1f5f9;
            color: var(--text-main);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .back-btn:hover {
            background-color: #e2e8f0;
        }

        .iframe-container {
            width: 100%;
            height: 78vh;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Adaptive Mobile Breakdown responsiveness */
        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }
            .nav-menu {
                gap: 12px;
            }
            .welcome-header h1 {
                font-size: 26px;
            }
            .iframe-container {
                height: 70vh;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a class="logo" onclick="showDashboard()">📋 QuizDashboard</a>
        <div class="nav-menu">
            <a onclick="showDashboard()">Dashboard</a>
        </div>
    </nav>

    <div class="container">
        
        <div id="dashboardView" class="view-section active">
            <div class="welcome-header">
                <h1>Academic Quizzes</h1>
                <p>Select a subject configuration card below to launch its dedicated module testing workspace.</p>
            </div>
            
            <div class="subject-grid" id="subjectGrid"></div>
        </div>

        <div id="quizView" class="view-section">
            <div class="quiz-header-bar">
                <div class="current-subject-title" id="currentSubjectTitle">Loading Quiz...</div>
                <button class="back-btn" onclick="showDashboard()">🏠 Close & Return</button>
            </div>
            <div class="iframe-container">
                <iframe id="quizIframe" src="" title="Quiz Runner Workspace"></iframe>
            </div>
        </div>

    </div>

    <script>
        // =========================================================================
        // SUBJECT DATABASE REGISTRY
        // Add new separate HTML pages here without changing any other code.
        // =========================================================================
        const QUIZ_SUBJECTS = [
            {
                title: "Employability Skills",
                desc: "Industry readiness assessment evaluating quantitative models, corporate behaviors, and strategic workspace ethics.",
                icon: "💼",
                fileUrl: "employability_quiz.html" // Points to your separate file
            },
            {
                title: "Natural Language Processing",
                desc: "Midterm analysis covering language processing layers, tokenization matching rules, and sequence parsing logic.",
                icon: "🤖",
                fileUrl: "nlp.html" // Points to your separate file
            }
        ];

        // Initialization Run
        function initDashboard() {
            const grid = document.getElementById('subjectGrid');
            grid.innerHTML = ''; // Reset frame layout

            QUIZ_SUBJECTS.forEach((subject) => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `
                    <div>
                        <div class="card-icon">${subject.icon}</div>
                        <div class="card-title">${subject.title}</div>
                        <div class="card-desc">${subject.desc}</div>
                    </div>
                    <button class="start-btn" onclick="launchQuiz('${subject.fileUrl}', '${subject.title}')">Start MCQ</button>
                `;
                grid.appendChild(card);
            });
        }

        // Action: Render the separate HTML file from the outside
        function launchQuiz(url, title) {
            document.getElementById('currentSubjectTitle').innerText = title;
            
            // Set the frame source directly to your separate clean HTML file
            document.getElementById('quizIframe').src = url;

            // Interface state toggle
            document.getElementById('dashboardView').classList.remove('active');
            document.getElementById('quizView').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Return back home and unload iframe context memory
        function showDashboard() {
            document.getElementById('quizView').classList.remove('active');
            document.getElementById('dashboardView').classList.add('active');
            document.getElementById('quizIframe').src = ""; // Flush background script execution
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Trigger loading routine
        window.onload = initDashboard;
    </script>
</body>
</html>
